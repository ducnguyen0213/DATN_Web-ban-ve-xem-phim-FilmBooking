<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đặt lại mật khẩu - FilmBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/users/css/dangky.css}">
    <link rel="icon" th:href="@{/users/img/logo.png}" type="image/x-icon"/>
</head>
<body>
<div th:replace="~{/layout/Header :: header}"></div>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3">Đặt lại mật khẩu</h5>
                    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>
                    <form th:action="@{/filmbooking/reset-password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="token" th:value="${token}"/>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu mới</label>
                            <input type="password" name="newPassword" class="form-control" placeholder="Ít nhất 8 ký tự" required minlength="8"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Xác nhận mật khẩu mới</label>
                            <input type="password" name="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu" required minlength="8"/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đặt lại mật khẩu</button>
                    </form>
                    <hr>
                    <a th:href="@{/filmbooking/login}" class="text-decoration-none">← Quay lại đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{/layout/Footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
