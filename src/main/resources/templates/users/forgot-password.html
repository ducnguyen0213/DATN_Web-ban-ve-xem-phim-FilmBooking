<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quên mật khẩu - FilmBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/users/css/dangky.css}">
    <link rel="icon" th:href="@{/users/img/logo.png}" type="image/x-icon"/>
</head>
<body>
<div th:replace="~{/layout/Header :: header}"></div>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h5 class="card-title mb-3">Quên mật khẩu</h5>
                    <p class="text-muted small">Nhập email đã đăng ký. Nếu email tồn tại, bạn sẽ nhận link đặt lại mật khẩu.</p>
                    <div th:if="${forgotMessage}" class="alert alert-info py-2" th:text="${forgotMessage}"></div>
                    <form th:action="@{/filmbooking/forgot-password}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="email@example.com" required autofocus/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Gửi link đặt lại mật khẩu</button>
                    </form>
                    <hr>
                    <a th:href="@{/filmbooking/login}" class="text-decoration-none">← Quay lại đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{/layout/Footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
