<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thêm tài khoản Admin - FilmBooking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="shortcut icon" type="image/png" th:href="@{/admin/assets/imgLogo/logo.png}">
    <link rel="stylesheet" th:href="@{/admin/css/index.css}">
    <link rel="stylesheet" th:href="@{/admin/css/customer.css}">
    <link rel="stylesheet" th:href="@{/admin/css/home.css}">
</head>
<body>
<div th:replace="~{/layout/header-admin :: header}"></div>

<!-- Main content: container căn giữa, form rộng 60-70% -->
<section class="py-4">
    <div class="container">
        <!-- Flash message: thành công -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <!-- Flash message: lỗi -->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Card chứa form - rộng ~65%, căn giữa -->
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-7">
                <div class="card shadow-sm border-0">
                    <!-- Tiêu đề card -->
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-person-plus-fill me-2"></i>Thêm tài khoản Admin
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/customer/save-admin}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                            <!-- Hàng 1: Họ tên (trái) | Số điện thoại (phải) -->
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label for="name" class="form-label">Họ tên <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="name" name="name" required
                                           maxlength="255" placeholder="Nhập họ tên đầy đủ"/>
                                </div>
                                <div class="col-md-6">
                                    <label for="phoneNumber" class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="phoneNumber" name="phoneNumber" required
                                           pattern="^0\d{9,10}$" placeholder="Ví dụ: 0981234567"/>
                                </div>
                            </div>

                            <!-- Hàng 2: Email (một dòng) -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="email" name="email" required
                                       placeholder="admin@email.com"/>
                            </div>

                            <!-- Hàng 3: Mật khẩu (một dòng) -->
                            <div class="mb-4">
                                <label for="password" class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                                <input type="password" class="form-control" id="password" name="password" required
                                       minlength="8" placeholder="Tối thiểu 8 ký tự"/>
                            </div>

                            <!-- Nút hành động: căn phải, cùng hàng -->
                            <div class="d-flex flex-wrap justify-content-end gap-2">
                                <a th:href="@{/customer/find-all}" class="btn btn-outline-secondary">
                                    <i class="bi bi-list-ul me-1"></i>Danh sách khách hàng
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-person-plus me-1"></i>Tạo tài khoản Admin
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
