<!DOCTYPE html>
<html class="no-js" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ĐĂNG NHẬP QUẢN TRỊ - FILMBOOKING</title>
    <link rel="stylesheet" th:href="@{/users/css/dangky.css}">
    <link rel="icon" th:href="@{/users/img/logo.png}" type="image/x-icon"/>
</head>
<body>
<!-- navbar -->
<div th:replace="~{/layout/Header :: header}"></div>
<br>
<div id="login-box">
    <div th:if="${ERR_LOGIN != null}" class="alert alert-danger" id="loginErrAlert" role="alert">
        [[${ERR_LOGIN}]]
    </div>
    <div class="left">
        <h1>ĐĂNG NHẬP QUẢN TRỊ</h1>
        <div style="margin-top: 70px;">
            <form id="adminLoginForm" th:action="@{/admin/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="text" name="email" placeholder="E-mail" required autofocus/>
                <input type="password" name="password" placeholder="Password" required/>
                <input type="submit" name="signup_submit" value="ĐĂNG NHẬP"/>
            </form>
        </div>
        <p style="margin-top: 20px; font-size: 14px;">
            <a th:href="@{/filmbooking/trangchu}" style="color: #16a085;">← Về trang chủ</a>
            &nbsp;|&nbsp;
            <a th:href="@{/filmbooking/login}" style="color: #16a085;">Đăng nhập khách hàng</a>
        </p>
    </div>
    <div class="right">
        <span class="loginwith">Đăng nhập với<br/>social network</span>
        <button type="button" class="social-signin facebook">Log in with facebook</button>
        <button type="button" class="social-signin twitter">Log in with Twitter</button>
        <button type="button" class="social-signin google">Log in with Google+</button>
    </div>
    <div class="or">OR</div>
</div>
<br>
<div th:replace="~{/layout/Footer :: footer}"></div>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/js/all.min.js"></script>
<script th:src="@{/users/js/dangky.js}"></script>
<script>
    (function() {
        var el = document.getElementById("loginErrAlert");
        if (el) setTimeout(function() { el.style.display = "none"; }, 5000);
    })();
</script>
</html>
